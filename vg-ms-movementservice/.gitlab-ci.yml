stages:
  - test
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DOCKER_IMAGE: jossuetorres/vg-ms-movementservice:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: jossuetorres/vg-ms-movementservice:latest

cache:
  paths:
    - .m2/repository/

# ==================== TEST STAGE ====================
test:
  stage: test
  image: maven:3.9-eclipse-temurin-17-alpine
  script:
    - mvn clean verify -B -Dsurefire.failIfNoSpecifiedTests=false
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/*.xml
  only:
    - merge_requests
    - main
    - develop

# ==================== BUILD STAGE ====================
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main
    - develop

# ==================== DEPLOY STAGE ====================
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "
        echo '$DOCKERHUB_TOKEN' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin &&
        docker pull $DOCKER_IMAGE_LATEST &&
        docker stop movementservice || true &&
        docker rm movementservice || true &&
        docker run -d --name movementservice -p 5005:5005 $DOCKER_IMAGE_LATEST
      "
  environment:
    name: staging
  only:
    - develop
  when: manual

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS_PROD" >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER_PROD@$SSH_HOST_PROD "
        echo '$DOCKERHUB_TOKEN' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin &&
        docker pull $DOCKER_IMAGE &&
        docker stop movementservice || true &&
        docker rm movementservice || true &&
        docker run -d --name movementservice -p 5005:5005 $DOCKER_IMAGE
      "
  environment:
    name: production
  only:
    - main
  when: manual
