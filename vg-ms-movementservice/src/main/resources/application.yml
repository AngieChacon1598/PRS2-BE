spring:
  application:
    name: movementservice

  jackson:
    time-zone: America/Lima
    date-format: yyyy-MM-dd'T'HH:mm:ss

  r2dbc:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool:
      enabled: true
      initial-size: 1
      max-size: 3
      max-idle-time: 30m
      max-acquire-time: 60s
      max-create-connection-time: 60s
      validation-query: SELECT 1
    properties:
      sslMode: require
      preparedStatementCacheQueries: 0
      connectTimeout: 60s

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/sipreb}
          jws-algorithms: RS256

  main:
    web-application-type: reactive


server:
  port: 5005


# Configuración de OpenAPI / Swagger
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha


management:
  endpoint:
    health:
      show-details: always


logging:
  level:
    root: INFO
    org.springframework.r2dbc: DEBUG
    org.springframework.data.r2dbc: DEBUG
    reactor.core.publisher: DEBUG


# Outbound HTTP (WebClient): connect/response timeouts, retries, circuit breakers + external MS URLs
services:
  http:
    connect-timeout-ms: 5000
    response-timeout-seconds: 10
    user-request-timeout-seconds: 5
    patrimonio-request-timeout-seconds: 10
    retry-total-attempts: 3
    retry-initial-interval-ms: 200
    retry-max-interval-seconds: 2
  patrimonio:
    url: ${PATRIMONIO_SERVICE_URL:https://lab.vallegrande.edu.pe/patrimonio/api/v1}
    enabled: true
  user:
    url: ${USER_SERVICE_URL:http://localhost:5002}


keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8081}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

# Resilience4j (used by Spring Cloud Circuit Breaker for outbound WebClient calls)
resilience4j:
  circuitbreaker:
    instances:
      userService:
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$NotFound
      patrimonioService:
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
