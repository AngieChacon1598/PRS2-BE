stages:
  - build
  - publish
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DOCKER_IMAGE: hilaryvivanco/vg-ms-inventarioservice:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: hilaryvivanco/vg-ms-inventarioservice:v2
  DOCKER_TLS_CERTDIR: "/certs"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository/

# ==================== BUILD STAGE ====================
build:
  stage: build
  image: maven:3.9-eclipse-temurin-17-alpine
  script:
    - mvn clean package -DskipTests -B
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests

# ==================== PUBLISH (Docker) STAGE ====================
publish:
  stage: publish
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main
    - develop

# ==================== DEPLOY STAGE ====================
.deploy_base: &deploy_base
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

deploy:staging:
  <<: *deploy_base
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $SSH_USER@$SSH_HOST "
        echo '$DOCKERHUB_TOKEN' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin &&
        docker pull $DOCKER_IMAGE_LATEST &&
        docker stop inventarioservice || true &&
        docker rm inventarioservice || true &&
        docker run -d --name inventarioservice \
          -p 5006:5006 \
          -e DATABASE_URL='$DATABASE_URL' \
          -e DB_USERNAME='$DB_USERNAME' \
          -e DB_PASSWORD='$DB_PASSWORD' \
          -e REDIS_URL='$REDIS_URL' \
          -e REDIS_SSL='$REDIS_SSL' \
          -e KEYCLOAK_URL='$KEYCLOAK_URL' \
          -e SERVER_PORT=5006 \
          -e ASSET_URL='$ASSET_URL' \
          -e CONFIG_URL='$CONFIG_URL' \
          -e USER_URL='$USER_URL' \
          --restart unless-stopped \
          $DOCKER_IMAGE_LATEST
      "
  environment:
    name: staging
  only:
    - develop
  when: manual

deploy:production:
  <<: *deploy_base
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST_PROD" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $SSH_USER_PROD@$SSH_HOST_PROD "
        echo '$DOCKERHUB_TOKEN' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin &&
        docker pull $DOCKER_IMAGE &&
        docker stop inventarioservice || true &&
        docker rm inventarioservice || true &&
        docker run -d --name inventarioservice \
          -p 5006:5006 \
          -e DATABASE_URL='$DATABASE_URL' \
          -e DB_USERNAME='$DB_USERNAME' \
          -e DB_PASSWORD='$DB_PASSWORD' \
          -e REDIS_URL='$REDIS_URL' \
          -e REDIS_SSL='$REDIS_SSL' \
          -e KEYCLOAK_URL='$KEYCLOAK_URL' \
          -e SERVER_PORT=5006 \
          -e ASSET_URL='$ASSET_URL' \
          -e CONFIG_URL='$CONFIG_URL' \
          -e USER_URL='$USER_URL' \
          --restart unless-stopped \
          $DOCKER_IMAGE
      "
  environment:
    name: production
  only:
    - main
  when: manual
