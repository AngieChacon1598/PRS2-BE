      - ROLE_EXPIRATION_CRON=0 0 0 * * *
      - USER_REACTIVATION_ENABLED=true
      - USER_REACTIVATION_CRON=0 0 * * * *
      - USER_UNBLOCK_ENABLED=true
      - USER_UNBLOCK_CRON=0 */5 * * * *
