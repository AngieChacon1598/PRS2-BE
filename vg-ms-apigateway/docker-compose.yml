  # --- API GATEWAY ---
  api-gateway:
    image: angie14/apigateway:latest
    container_name: api-gateway
    ports:
      - "5000:5000"
    environment:
      - KEYCLOAK_URL=https://lab.vallegrande.edu.pe/keycloak
      - KEYCLOAK_REALM=sipreb
      - KEYCLOAK_CLIENT_ID=sipreb-backend
      - KEYCLOAK_CLIENT_SECRET=6nx2O6hLT5iWimpk3DX4mm8gX51RcC2d
